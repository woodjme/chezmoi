# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Enable mouse
set -g mouse on

# Scrollback history
set -g history-limit 102400

# Start panes/windows at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Open new windows/panes in the current path
bind c new-window -c '#{pane_current_path}'
bind v split-window -h -p 30 -c '#{pane_current_path}'
bind V split-window -h -p 50 -c '#{pane_current_path}'
bind s split-window -v -p 30 -c '#{pane_current_path}'
bind S split-window -v -p 50 -c '#{pane_current_path}'

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Fix ESC delay in vim
set -g escape-time 10

# Terminal title
set -g set-titles on
set -g set-titles-string '#S:#W'

# Status bar
set-option -g status-position bottom
set-option -g status-justify left
set-option -g status-left '#[bg=#{?client_prefix,colour167,colour72}] #[bg=colour237] #[bg=colour236] #[bg=colour235]#[fg=colour185] #S #[bg=colour236] '
set-option -g status-left-length 16
set-option -g status-bg colour237
set-option -g status-right '#[bg=colour236] #[bg=colour235]#[fg=colour185] %a %R #[bg=colour236]#[fg=colour3] #[bg=colour237] #[bg=colour72] #[]'
set-option -g status-interval 60

# Pane borders
set-option -g pane-active-border-style fg=colour246
set-option -g pane-border-style fg=colour238

# Window status
set-window-option -g window-status-format '#[bg=colour238]#[fg=colour107] #I #[bg=colour239]#[fg=colour110] #[bg=colour240]#W#[bg=colour239]#[fg=colour195]#F#[bg=colour238] '
set-window-option -g window-status-current-format '#[bg=colour236]#[fg=colour215] #I #[bg=colour235]#[fg=colour167] #[bg=colour234]#W#[bg=colour235]#[fg=colour195]#F#[bg=colour236] '

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"
